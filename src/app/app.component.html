<div style="padding: 15px;">
    <h3 for="">Images with Initial State</h3>
    <tis-image-and-file-upload-and-view type="image" viewType="card" [urlConfig]="urlConfig" [entityType]="'image_details'" [disabled]="false"
        [options]="{selectorId: 'choosing-image-for-image-details-card-view', height: '108px', isStoredDb: false, isMultiple: true, cols: 5, isCompressed: false}"
        accept=".png,.jpeg,.jpg" label="Upload Image" [dialogConfig]="this.getImagePickerDialogConfig()">
    </tis-image-and-file-upload-and-view>

    <br><br>

    <h3 for="">Images for View only with No Data</h3>
