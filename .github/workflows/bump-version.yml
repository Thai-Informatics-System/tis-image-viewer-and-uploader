name: Bump Version and Tag

on:
  push:
    branches: [master]

permissions:
  contents: write  # For committing and pushing tags

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --force

      - name: Bump version & inject
        env:
          BUMP: patch
        run: node scripts/bump-and-inject.mjs

      - name: Commit version changes (skip CI)
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "chore: bump version & inject [skip ci]"
            git push
          fi

      - name: Create tag for new version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          # Only create tag if it doesn't exist
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi
