name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0

permissions:
  contents: read
  packages: write  # For publishing to npm

jobs:
  publish:
    name: Publish Library
    runs-on: ubuntu-latest
    env:
      LIB_NAME: tis-image-and-file-upload-and-view

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci --force

      - name: Build library
        run: npm run build ${{ env.LIB_NAME }}

      - name: Publish to npm
        run: npm publish ./dist/${{ env.LIB_NAME }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
