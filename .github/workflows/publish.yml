name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0

jobs:
  publish:
    name: Publish Library
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build tis-image-and-file-upload-and-view

      - name: Publish to npm
        run: npm publish ./dist/tis-image-and-file-upload-and-view --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
