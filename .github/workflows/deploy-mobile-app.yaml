name: Deploy Mobile Upload App

on:
  push:
    branches:
      - 'master'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-southeast-1
      MOBILE_UPLOAD_S3_BUCKET: tis-image-and-file-upload-mobile-helper-app
      MOBILE_UPLOAD_CLOUDFRONT_ID: ERFZZRBEO056B

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Mobile Upload App for Production
        run: npm run build:mobile:prod
        env:
          CI: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.SERVICEMIND_PROD_AWS_KEY }}
          aws-secret-access-key: ${{ secrets.SERVICEMIND_PROD_AWS_SECRET }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/tis-mobile-upload/browser s3://${{ env.MOBILE_UPLOAD_S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.json"
          
          aws s3 cp dist/tis-mobile-upload/browser/index.html s3://${{ env.MOBILE_UPLOAD_S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
          
          # Copy any JSON files with no-cache headers
          find dist/tis-mobile-upload/browser -name "*.json" -exec aws s3 cp {} s3://${{ env.MOBILE_UPLOAD_S3_BUCKET }}/ \
            --cache-control "no-cache, no-store, must-revalidate" \;

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.MOBILE_UPLOAD_CLOUDFRONT_ID }} \
            --paths "/*"

      - name: Deployment Summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## Deployment Summary
          
          | Property | Value |
          |----------|-------|
          | **Environment** | Production |
          | **Branch** | ${{ github.ref_name }} |
          | **Commit** | \`${{ github.sha }}\` |
          | **S3 Bucket** | ${{ env.MOBILE_UPLOAD_S3_BUCKET }} |
          | **CloudFront Distribution** | ${{ env.MOBILE_UPLOAD_CLOUDFRONT_ID }} |
          EOF